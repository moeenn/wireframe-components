<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="../style.css" />
	<script type="module" src="../src/index.mjs"></script>
	<title>Document</title>
	<style>
		*,
		::before,
		::after {
			box-sizing: border-box;
			font-family: sans-serif;
			color: hsl(var(--x-primary-1));
		}

		body {
			padding: 0;
			margin: 0;
			height: 100vh;
		}

		.button,
		a {
			cursor: pointer;
		}

		table {
			width: stretch;
			border-collapse: collapse;
			table-layout: fixed;
			border: var(--x-border-size-1) solid hsl(var(--x-gray-3));
			border-radius: var(--x-border-radius);
		}

		.table-container {
			width: 100%;
			overflow-x: auto;
		}

		.x-table {
			thead {
				background-color: hsl(var(--x-gray-1));
				border-bottom: var(--x-border-size-1) solid hsl(var(--x-gray-3));
				border-radius: var(--x-border-radius) var(--x-border-radius) 0 0;

				th {
					padding: var(--x-spacing-4);
					font-size: var(--x-text-xs);
					color: hsl(var(--x-gray-7));
					font-weight: normal;
				}
			}

			tbody {
				tr {
					color: hsl(var(--x-font-color));
					background: white;

					&:hover {
						background: hsl(var(--x-gray-1));
						border-radius: var(--x-border-radius);
					}
				}

				td {
					padding: var(--x-spacing-5) var(--x-spacing-4);
					font-size: var(--x-text-sm);
				}
			}

			.left {
				text-align: left;
			}

			.center {
				text-align: center;
			}

			.right {
				text-align: right;
			}
		}

		.table-footer {
			color: hsl(var(--x-font-color));
			font-size: var(--x-text-xs);
			padding: var(--x-spacing-4);
			background-color: hsl(var(--x-gray-1));
			display: flex;
			justify-content: space-between;
			border: var(--x-border-size-1) solid hsl(var(--x-gray-3));
			border-top: none;
			border-radius: 0 0 var(--x-border-radius) var(--x-border-radius);

			select {
				background-color: hsl(var(--x-gray-1));
				border-radius: var(--x-border-radius);
				border: none;
			}

			.pagination {
				display: inline-flex;

				button {
					border: none;
					border-radius: var(--x-border-radius);
					padding: var(--x-spacing-2);

					svg {
						margin: auto;
						height: 1rem;
					}
				}

				span {
					margin: auto 0.4rem;
				}
			}
		}

		.table-actions {
			display: flex;
			justify-content: space-between;
			padding: var(--x-spacing-3);
			background-color: hsla(var(--x-gray-1), 0.5);
			color: hsl(var(--x-font-color));
			border: var(--x-border-size-1) solid hsl(var(--x-gray-3));
			border-bottom: none;
			font-size: var(--x-text-xs);

			div {
				display: inline-flex;

				button {
					background-color: hsl(var(--x-gray-1));
					margin: auto 0;
					border-radius: var(--x-border-radius);
					border: var(--x-border-size-1) solid hsl(var(--x-gray-4));
					color: var(--x-font-color);

					&:hover {
						background-color: hsl(var(--x-gray-2));
					}
				}

				input[type="search"] {
					background-color: hsl(var(--x-gray-1));
				}
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="table-actions">
			<div>
				<button id="open" class="button" title="Add new user"">Add</button>
			</div>

			<!--<div>
				<input
					id=" search" name="search" type="search" placeholder="Search" />
			</div>-->
		</div>

		<div class="table-container">
			<table class="x-table">
				<colgroup>
					<col width="50px" />
					<col width="auto" style="min-width: 200px" />
					<col width="150px" />
					<col width="150px" />
					<col width="150px" />
				</colgroup>
				<thead>
					<tr>
						<th class="left">ID</th>
						<th class="left">Email</th>
						<th class="left">Name</th>
						<th class="left">Role</th>
						<th class="left">Joined at</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>10</td>
						<td>admin@site.com</td>
						<td>Mr. Admin</td>
						<td>ADMIN</td>
						<td>2025-01-20</td>
					</tr>
					<tr>
						<td>10</td>
						<td>admin@site.com</td>
						<td>Mr. Admin</td>
						<td>ADMIN</td>
						<td>2025-01-20</td>
					</tr>
					<tr>
						<td>10</td>
						<td>admin@site.com</td>
						<td>Mr. Admin</td>
						<td>ADMIN</td>
						<td>2025-01-20</td>
					</tr>
					<tr>
						<td>10</td>
						<td>admin@site.com</td>
						<td>Mr. Admin</td>
						<td>ADMIN</td>
						<td>2025-01-20</td>
					</tr>
					<tr>
						<td>10</td>
						<td>admin@site.com</td>
						<td>Mr. Admin</td>
						<td>ADMIN</td>
						<td>2025-01-20</td>
					</tr>
				</tbody>
			</table>
		</div>
		<div class="table-footer">
			<select id="perPage" name="perPage">
				<option>10 Results</option>
				<option>20 Results</option>
				<option>50 Results</option>
				<option>100 Results</option>
			</select>

			<div class="pagination">
				<button>
					<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
						stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
					</svg>
				</button>
				<span>Page 1 / 5</span>
				<button>
					<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
						stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
					</svg>
				</button>
			</div>
		</div>

		<x-modal heading="Add User" width="30rem">
			<form style="padding: 1rem">
				<fieldset>
					<label for="name">Name</label>
					<input id="name" name="name" />
				</fieldset>

				<fieldset>
					<label for="password">Password</label>
					<input id="password" name="password" />
				</fieldset>

				<fieldset>
					<label for="confirmPassword">Confirm Password</label>
					<input id="confirmPassword" name="confirmPassword" />
				</fieldset>
			</form>

			<div slot="footer">
				<button>Save</button>
			</div>
		</x-modal>

		<script>
			document.addEventListener("DOMContentLoaded", () => {
				const open = document.querySelector("#open")
				const modal = document.querySelector("x-modal")

				open.addEventListener("click", () => {
					modal.setOpen()
				})
			})
		</script>
	</div>
</body>

</html>
