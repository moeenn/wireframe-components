<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./style.css" />
		<script type="module" src="./src/index.mjs"></script>
		<title>Document</title>
		<style>
			*,
			::before,
			::after {
				box-sizing: border-box;
				font-family: sans-serif;
				color: black;
			}

			body {
				padding: 0;
				margin: 0;
			}

			.button,
			a {
				cursor: pointer;
			}

			fieldset {
				padding: 0;
				border: none;
				margin-bottom: 2rem;
			}

			label {
				font-size: 0.8rem;
				display: block;
				padding-bottom: 0.2rem;
				color: hsl(var(--x-font-color));
			}

			input {
				padding: 0.5rem;
				width: stretch;
				font-size: 0.9rem;
				border-radius: 0.2rem;
				border: var(--x-border-size) solid hsl(var(--x-gray-4));
				background-color: hsla(var(--x-gray-1), 20%);
			}

			button {
				padding: 0.4rem 0.7rem;
				border: var(--x-border-size) solid hsl(var(--x-gray-5));
				border-radius: var(--x-border-radius);
				cursor: pointer;
				background-color: hsl(var(--x-gray-1));

				&:hover {
					background-color: hsl(var(--x-gray-2));
				}
			}

			.menu-item {
				padding: 0.5rem;
				margin: 0;
				cursor: pointer;

				&:hover {
					background: hsl(var(--x-gray-3));
				}
			}
		</style>
	</head>

	<body style="padding: 3rem">
		<x-menu width="30rem">
			<button slot="trigger" position="right">Open Menu</button>
			<div slot="items">
				<p class="menu-item">One</p>
				<p class="menu-item">Two</p>
				<p class="menu-item">Three</p>
				<p class="menu-item">Four</p>
				<p class="menu-item">Five</p>
			</div>
		</x-menu>

		<x-menu style="position: absolute; right: 2rem" position="left">
			<button slot="trigger">Open Menu</button>
			<div slot="items">
				<p class="menu-item">One</p>
				<p class="menu-item">Two</p>
				<p class="menu-item">Three</p>
				<p class="menu-item">Four</p>
				<p class="menu-item">Five</p>
			</div>
		</x-menu>

		<x-menu
			style="position: absolute; bottom: 2rem; left: 2rem"
			position="top-right"
		>
			<button slot="trigger">Open Menu</button>
			<div slot="items">
				<p class="menu-item">One</p>
				<p class="menu-item">Two</p>
				<p class="menu-item">Three</p>
				<p class="menu-item">Four</p>
				<p class="menu-item">Five</p>
			</div>
		</x-menu>

		<x-menu
			style="position: absolute; bottom: 2rem; right: 2rem"
			position="top-left"
		>
			<button slot="trigger">Open Menu</button>
			<div slot="items">
				<p class="menu-item">One</p>
				<p class="menu-item">Two</p>
				<p class="menu-item">Three</p>
				<p class="menu-item">Four</p>
				<p class="menu-item">Five</p>
			</div>
		</x-menu>

		<script>
			const menu = document.querySelector("x-menu");
			const items = document.querySelectorAll(".menu-item");
			items.forEach((item) =>
				item.addEventListener("click", (e) => {
					console.log("clicked ::", e.target.innerText);
					menu.setAttribute("open", "false");
				}),
			);
		</script>
	</body>
</html>
